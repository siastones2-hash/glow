// ══ 15. OFFERING STATS (헌금 통계 심화) ═══════════════
function OfferingStatsTab({ offerings, members }) {
  const years=[...new Set(offerings.filter(o=>o.status==="confirmed").map(o=>o.date.slice(0,4)))].sort().reverse();
  const defaultYear=years[0]||String(new Date().getFullYear());
  const [selYear, setSelYear] = useState(defaultYear);

  const confirmed=offerings.filter(o=>o.status==="confirmed");
  const yearOff=confirmed.filter(o=>o.date.startsWith(selYear));
  const prevYear=String(parseInt(selYear,10)-1);
  const prevOff=confirmed.filter(o=>o.date.startsWith(prevYear));
  const monthlyData=Array.from({length:12},(_,i)=>{
    const m=String(i+1).padStart(2,"0");
    const cur=yearOff.filter(o=>o.date.slice(5,7)===m);
    const prev=prevOff.filter(o=>o.date.slice(5,7)===m);
    const sum=a=>a.reduce((s,o)=>s+o.amount,0);
    return {month:`${i+1}월`,total:sum(cur),prev:sum(prev)};
  });
  const thisYearTotal=yearOff.reduce((s,o)=>s+o.amount,0);
  const prevYearTotal=prevOff.reduce((s,o)=>s+o.amount,0);
  const growthRate=prevYearTotal?((thisYearTotal-prevYearTotal)/prevYearTotal*100).toFixed(1):(thisYearTotal?"100.0":"0.0");
  const maxMonthly=Math.max(...monthlyData.map(m=>Math.max(m.total,m.prev)),1);
  const typeColors={십일조:C.violet,주일헌금:C.gold,감사헌금:C.emerald,선교헌금:C.sky,건축헌금:C.rose,구제헌금:C.indigo,특별헌금:C.amber};
  const typeBreakdown=OFFERING_TYPES.map(t=>{
    const v=yearOff.filter(o=>o.type===t).reduce((s,o)=>s+o.amount,0);
    return {t,v,pct:thisYearTotal?Math.round(v/thisYearTotal*100):0,c:typeColors[t]||C.indigo};
  }).filter(x=>x.v>0);
  const giverCount=new Set(yearOff.map(o=>o.member)).size;
  const memberBase=Math.max(members.filter(m=>m.status==="active").length, giverCount, 1);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8,alignItems:"center"}}>
        <span style={{color:C.muted,fontSize:11,fontFamily:F}}>헌금 통계 연도</span>
        <Sel value={selYear} onChange={setSelYear} opts={(years.length?years:[defaultYear])}/>
      </div>
      {/* 연간 요약 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
        {[
          {l:"연간 총 헌금",v:`₩${fmt(thisYearTotal)}`,c:C.gold},
          {l:"전년 대비",v:`+${growthRate}%`,c:C.emerald},
          {l:"월 평균",v:`₩${fmt(Math.round(thisYearTotal/12))}`,c:C.violet},
          {l:"성도 1인 평균",v:`₩${fmt(Math.round(thisYearTotal/memberBase))}`,c:C.sky},
        ].map(x=>(
          <Card key={x.l} style={{padding:"14px 18px"}}>
            <div style={{color:C.muted,fontSize:11,fontFamily:F,marginBottom:3}}>{x.l}</div>
            <div style={{color:x.c,fontSize:17,fontWeight:700,fontFamily:F}}>{x.v}</div>
          </Card>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:18}}>
        {/* 월별 바차트 */}
        <Card style={{padding:22}}>
          <SH title="월별 헌금 추이" sub={`${selYear}년 (전년 대비)`}/>
          <div style={{display:"flex",alignItems:"flex-end",gap:5,height:140,marginBottom:10}}>
            {monthlyData.map((d,i)=>(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                {/* 전년 */}
                <div style={{width:"100%",display:"flex",gap:2,alignItems:"flex-end",height:120}}>
                  <div style={{flex:1,height:Math.round(d.prev/maxMonthly*110),
                    background:`${C.gold}44`,borderRadius:"3px 3px 0 0",transition:"height .5s"}}/>
                  <div style={{flex:1,height:Math.round(d.total/maxMonthly*110),
                    background:`linear-gradient(180deg,${C.violet},${C.violet}88)`,
                    borderRadius:"3px 3px 0 0",transition:"height .5s"}}/>
                </div>
                <span style={{color:C.muted,fontSize:9,fontFamily:F}}>{d.month}</span>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:16}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:10,height:10,borderRadius:2,background:`${C.gold}44`}}/>
              <span style={{color:C.muted,fontSize:11,fontFamily:F}}>전년</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:10,height:10,borderRadius:2,background:C.violet}}/>
              <span style={{color:C.muted,fontSize:11,fontFamily:F}}>올해</span>
            </div>
          </div>
        </Card>

        {/* 유형별 */}
        <Card style={{padding:22}}>
          <SH title="헌금 유형별 비율"/>
          {typeBreakdown.map((t,i)=>(
            <div key={i} style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{color:C.sub,fontSize:12,fontFamily:F}}>{t.t}</span>
                <span style={{color:t.c,fontSize:12,fontFamily:F,fontWeight:700}}>{t.pct}%</span>
              </div>
              <div style={{background:C.s3,borderRadius:4,height:8,position:"relative"}}>
                <div style={{background:t.c,borderRadius:4,height:8,
                  width:`${t.pct}%`,transition:"width .6s"}}/>
              </div>
              <div style={{color:C.muted,fontSize:10,fontFamily:F,marginTop:2}}>₩{fmt(t.v)}</div>
            </div>
          ))}
        </Card>
      </div>

      {/* 분기별 비교 */}
      <Card style={{padding:22}}>
        <SH title="분기별 비교" sub="전년 대비"/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
          {["1분기","2분기","3분기","4분기"].map((q,i)=>{
            const months=monthlyData.slice(i*3,i*3+3);
            const total=months.reduce((s,m)=>s+m.total,0);
            const prev=months.reduce((s,m)=>s+m.prev,0);
            const chg=prev?((total-prev)/prev*100).toFixed(1):(total?"100.0":"0.0");
            return (
              <div key={q} style={{background:C.s2,borderRadius:12,padding:"16px 18px",
                borderTop:`3px solid ${parseFloat(chg)>=0?C.emerald:C.rose}`}}>
                <div style={{color:C.muted,fontSize:11,fontFamily:F,marginBottom:4}}>{q}</div>
                <div style={{color:C.text,fontSize:16,fontWeight:700,fontFamily:F,marginBottom:4}}>₩{fmt(total)}</div>
                <div style={{color:parseFloat(chg)>=0?C.emerald:C.rose,fontSize:12,fontFamily:F,fontWeight:600}}>
                  {parseFloat(chg)>=0?"+":""}{chg}%
                </div>
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

            </div>
            <div style={{background:C.s2,borderRadius:10,padding:"10px 12px",border:`1px solid ${C.border}`}}>
              <div style={{color:C.text,fontSize:11,fontFamily:F,fontWeight:600}}>관리자 류종철</div>
              <div style={{color:C.muted,fontSize:9,fontFamily:F,marginTop:1}}>장로 · 재정부</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
                <span style={{color:C.emerald,fontSize:9}}>● 온라인</span>
                <button onClick={()=>setResetConfirm(true)}
                  style={{background:"none",border:`1px solid ${C.rose}44`,borderRadius:5,
                    padding:"2px 7px",color:C.rose,fontSize:9,cursor:"pointer",fontFamily:F}}>초기화</button>
              </div>
            </div>
          </div>
        </aside>

        {/* Main */}
        <main ref={mainRef} className="erp-main" style={{
          marginLeft:isMobile?0:200,flex:1,
          padding:isMobile?"calc(60px + env(safe-area-inset-top, 0px)) 12px calc(84px + env(safe-area-inset-bottom, 0px))":24,
          minHeight:"100vh",overflowX:"hidden",width:"100%",
        }}>
          {!isMobile ? (
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            marginBottom:20,paddingBottom:14,borderBottom:`1px solid ${C.border}`}}>
            <div>
              <h1 style={{color:C.text,fontFamily:FB,fontSize:18,fontWeight:700}}>{curNav.label}</h1>
              <p style={{color:C.muted,fontSize:11,fontFamily:F,marginTop:2}}>
                {new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"long"})}
              </p>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <Badge c={C.violet}>15개 모듈</Badge>
              <Badge c={C.emerald}>실시간 저장</Badge>
            </div>
          </div>
          ) : (
          <div style={{marginBottom:14}}>
            <h1 style={{color:C.text,fontFamily:FB,fontSize:17,fontWeight:700,marginBottom:4}}>{curNav.label}</h1>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <Badge c={C.emerald}>실시간 저장</Badge>
              <span style={{color:C.muted,fontSize:10,fontFamily:F}}>
                {new Date().toLocaleDateString("ko-KR",{month:"long",day:"numeric",weekday:"short"})}
              </span>
            </div>
          </div>
          )}
          {content[tab]}
        </main>

        {isMobile && (
          <nav style={{
            position:"fixed",bottom:0,left:0,right:0,zIndex:8,
            background:C.s1,borderTop:`1px solid ${C.border}`,
            display:"flex",padding:"4px 2px calc(4px + env(safe-area-inset-bottom, 0px))",
            boxShadow:"0 -4px 20px rgba(26,43,60,.06)",
          }}>
            {MOBILE_QUICK.map(n=>(
              <button key={n.id} onClick={()=>goTab(n.id)} className="erp-nav-btn" style={{
                flex:1,background:tab===n.id?`${C.gold}12`:"none",border:"none",cursor:"pointer",
                borderRadius:10,margin:"2px",minHeight:52,
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,
              }}>
                <span style={{fontSize:18}}>{n.icon}</span>
                <span style={{fontSize:10,fontFamily:F,
                  color:tab===n.id?C.gold:C.muted,fontWeight:tab===n.id?700:500}}>{n.label}</span>
              </button>
            ))}
            <button onClick={()=>setMenuOpen(true)} className="erp-nav-btn" style={{
              flex:1,background:"none",border:"none",cursor:"pointer",minHeight:52,
              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,
              borderRadius:10,margin:"2px",
            }}>
              <span style={{fontSize:18}}>☰</span>
              <span style={{fontSize:10,fontFamily:F,color:C.muted,fontWeight:500}}>메뉴</span>
            </button>
          </nav>
        )}
      </div>

      <ToastContainer/>

      <ConfirmDialog
        open={resetConfirm}
        title="전체 데이터 초기화"
        message={"모든 데이터가 초기 샘플로 되돌아갑니다.\n입력한 데이터는 모두 삭제됩니다.\n계속하시겠습니까?"}
        confirmText="초기화"
        confirmV="rose"
        onConfirm={resetAll}
        onCancel={()=>setResetConfirm(false)}
      />
    </>
  );
}
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ChurchERPv5/>);
  </script>
</body>
</html>
