<html lang="ko">

  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useEffect, useRef } = React;
// ═══════════════════════════════════════════════════════════
// CHURCH ERP v5.5 — MOBILE+ (밝은 교회 테마 + 모바일 최적화)
// ✅ localStorage 영속성 (새로고침해도 데이터 유지)
// ✅ Toast 알림 (저장/삭제/오류 피드백)
// ✅ 입력값 유효성 검사 (전화번호·금액·날짜·필수값)
// ✅ 삭제/승인 확인 다이얼로그
// ✅ 에러 경계 처리
// ✅ 15개 탭 전부 연동
// ═══════════════════════════════════════════════════════════


const C = {
  bg:"#F4F7FB", s1:"#FFFFFF", s2:"#EEF3FA", s3:"#E2EAF4",
  border:"#D5DFEC", borderHi:"#B8C9DC",
  violet:"#4A6FA5", gold:"#C9922A", emerald:"#2D9B6F",
  rose:"#D94F68", sky:"#3A8FD9", amber:"#D4880F", indigo:"#5C6BC0",
  text:"#1A2B3C", sub:"#4A5D73", muted:"#8A9BB0",
};
const FONTS = `@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');`;
const F = "'Noto Sans KR',sans-serif";
const FB = "'Libre Baskerville',serif";

// ── Validation Helpers ─────────────────────────────────
const V = {
  required: v => !!(v?.toString().trim()),
  phone: v => /^010-\d{4}-\d{4}$/.test(v||""),
  amount: v => !isNaN(v) && parseInt(v) > 0,
  date: v => !!(v) && !isNaN(Date.parse(v)),
  minLen: (v,n) => (v||"").trim().length >= n,
};
const phoneFormat = v => {
  const d = v.replace(/\D/g,"").slice(0,11);
  if(d.length<=3) return d;
  if(d.length<=7) return d.slice(0,3)+"-"+d.slice(3);
  return d.slice(0,3)+"-"+d.slice(3,7)+"-"+d.slice(7);
};
const amountFormat = v => v.replace(/[^0-9]/g,"");

// ── localStorage 유틸 ──────────────────────────────────
const LS = {
  get: (key, def) => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
    catch { return def; }
  },
  set: (key, val) => {
    try { localStorage.setItem(key, JSON.stringify(val)); return true; }
    catch { return false; }
  },
  clear: key => { try { localStorage.removeItem(key); } catch {} },
};

// ── Toast System ───────────────────────────────────────
const TOAST_DURATION = 3000;
let toastId = 0;
let toastSetter = null;

const toast = {
  success: msg => toastSetter?.(p=>[...p,{id:++toastId,msg,type:"success"}]),
  error:   msg => toastSetter?.(p=>[...p,{id:++toastId,msg,type:"error"}]),
  info:    msg => toastSetter?.(p=>[...p,{id:++toastId,msg,type:"info"}]),
  warn:    msg => toastSetter?.(p=>[...p,{id:++toastId,msg,type:"warn"}]),
};

function ToastContainer() {
  const [toasts, setToasts] = useState([]);
  const isMobile = useIsMobile();
  useEffect(() => { toastSetter = setToasts; return () => { toastSetter = null; }; }, []);
  useEffect(() => {
    if(!toasts.length) return;
    const t = setTimeout(()=>setToasts(p=>p.slice(1)), TOAST_DURATION);
    return ()=>clearTimeout(t);
  }, [toasts]);
  const icons = {success:"✅",error:"❌",info:"ℹ️",warn:"⚠️"};
  const colors = {success:C.emerald,error:C.rose,info:C.sky,warn:C.amber};
  return (
    <div style={{
      position:"fixed", zIndex:9999, display:"flex", flexDirection:"column", gap:8,
      bottom: isMobile ? "calc(72px + env(safe-area-inset-bottom, 0px))" : 24,
      right: isMobile ? 12 : 24, left: isMobile ? 12 : "auto",
    }}>
      {toasts.map(t=>(
        <div key={t.id} style={{
          background:C.s1, border:`1px solid ${colors[t.type]}66`,
          borderLeft:`3px solid ${colors[t.type]}`,
          borderRadius:12, padding:"12px 16px",
          display:"flex", alignItems:"center", gap:10,
          boxShadow:"0 8px 32px rgba(26,43,60,.12)",
          animation:"slideIn .2s ease",
          minWidth: isMobile ? 0 : 260, maxWidth: isMobile ? "100%" : 380,
        }}>
          <span style={{fontSize:16,flexShrink:0}}>{icons[t.type]}</span>
          <span style={{color:C.text,fontSize:13,fontFamily:F,flex:1}}>{t.msg}</span>
          <button onClick={()=>setToasts(p=>p.filter(x=>x.id!==t.id))}
            style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:14,flexShrink:0}}>✕</button>
        </div>
      ))}
    </div>
  );
}

// ── Confirm Dialog ─────────────────────────────────────
function ConfirmDialog({ open, title, message, onConfirm, onCancel, confirmText="확인", confirmV="rose" }) {
  const isMobile = useIsMobile();
  if(!open) return null;
  return (
    <div onClick={onCancel} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",
      display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center",zIndex:1100,padding:isMobile?0:16}}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:C.s1,border:`1px solid ${C.borderHi}`,
        borderRadius:isMobile?"20px 20px 0 0":18,
        padding:isMobile?"24px 20px calc(20px + env(safe-area-inset-bottom, 0px))":"28px 32px",
        width:isMobile?"100%":380,maxWidth:"100%",
      }}>
        <div style={{fontSize:32,textAlign:"center",marginBottom:12}}>
          {confirmV==="rose"?"⚠️":"✅"}
        </div>
        <div style={{color:C.text,fontFamily:FB,fontSize:16,fontWeight:700,textAlign:"center",marginBottom:8}}>{title}</div>
        <div style={{color:C.sub,fontFamily:F,fontSize:13,textAlign:"center",marginBottom:24,lineHeight:1.6}}>{message}</div>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexDirection:isMobile?"column-reverse":"row"}}>
          <Btn v="ghost" onClick={onCancel} style={isMobile?{width:"100%",justifyContent:"center",padding:"12px 16px"}:{}}>취소</Btn>
          <Btn v={confirmV} onClick={onConfirm} style={isMobile?{width:"100%",justifyContent:"center",padding:"12px 16px"}:{}}>{confirmText}</Btn>
        </div>
      </div>
    </div>

}

// ── FormField with Validation ──────────────────────────
function Field({ label, error, children, required=false }) {
  return (
    <div>
      <label style={{color:error?C.rose:C.muted,fontSize:11,fontFamily:F,display:"block",marginBottom:4}}>
        {label}{required&&<span style={{color:C.rose,marginLeft:2}}>*</span>}
      </label>
      {children}
      {error&&<div style={{color:C.rose,fontSize:10,fontFamily:F,marginTop:3}}>⚠ {error}</div>}
    </div>

}

// ── Shared UI Atoms ────────────────────────────────────
const Btn = ({ children, v="primary", sz="md", onClick, style={}, disabled=false }) => {
  const p = sz==="sm"?{padding:"5px 13px",fontSize:11}:sz==="lg"?{padding:"12px 26px",fontSize:15}:{padding:"8px 16px",fontSize:13};
  const col = v==="primary"?{background:C.violet,color:"#fff",border:"none"}
    :v==="gold"?{background:C.gold,color:"#1a1000",border:"none"}
    :v==="emerald"?{background:`${C.emerald}22`,color:C.emerald,border:`1px solid ${C.emerald}44`}
    :v==="rose"?{background:`${C.rose}22`,color:C.rose,border:`1px solid ${C.rose}44`}
    :v==="amber"?{background:`${C.amber}22`,color:C.amber,border:`1px solid ${C.amber}44`}
    :v==="sky"?{background:`${C.sky}22`,color:C.sky,border:`1px solid ${C.sky}44`}
    :{background:"transparent",color:C.sub,border:`1px solid ${C.border}`};
  return (
    <button disabled={disabled} onClick={onClick} style={{
      ...p,...col,borderRadius:9,cursor:disabled?"not-allowed":"pointer",
      fontFamily:F,fontWeight:600,display:"inline-flex",alignItems:"center",
      gap:5,whiteSpace:"nowrap",opacity:disabled?0.5:1,transition:"all .15s",...style,
    }}>{children}</button>
  );
};
const Badge = ({ c, children }) => (
  <span style={{background:`${c}18`,color:c,border:`1px solid ${c}30`,
    borderRadius:6,padding:"2px 9px",fontSize:11,fontFamily:F,fontWeight:500,whiteSpace:"nowrap"}}>{children}</span>
);
const Card = ({ children, style={}, className="" }) => (
  <div className={className} style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:16,boxShadow:"0 1px 4px rgba(26,43,60,.06)",...style}}>{children}</div>
);
const SH = ({ title, sub, action }) => {
  const isMobile = useIsMobile();
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,
      flexDirection:isMobile?"column":"row",gap:isMobile?10:0}}>
      <div style={{minWidth:0,flex:1}}>
        <div style={{color:C.text,fontFamily:FB,fontSize:isMobile?15:14,fontWeight:700}}>{title}</div>
        {sub&&<div style={{color:C.muted,fontSize:11,fontFamily:F,marginTop:2}}>{sub}</div>}
      </div>
      {action&&<div style={{flexShrink:0,width:isMobile?"100%":"auto"}}>{action}</div>}
    </div>
  );
};
const Inp = ({ value, onChange, placeholder, type="text", style={}, error=false }) => (
  <input type={type} value={value??""} onChange={onChange} placeholder={placeholder}
    style={{background:C.s2,border:`1px solid ${error?C.rose:C.border}`,borderRadius:9,
      padding:"8px 13px",color:C.text,fontFamily:F,fontSize:13,outline:"none",
      width:"100%",boxSizing:"border-box",...style}}/>
);
const Sel = ({ value, onChange, opts, style={} }) => (
  <select value={value??""} onChange={e=>onChange(e.target.value)}
    style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:9,
      padding:"8px 13px",color:C.text,fontFamily:F,fontSize:13,outline:"none",
      cursor:"pointer",width:"100%",...style}}>
    {opts.map(o=><option key={typeof o==="object"?o.v:o} value={typeof o==="object"?o.v:o} style={{background:C.s2}}>
      {typeof o==="object"?o.l:o}</option>)}
  </select>
);
// ── Responsive ─────────────────────────────────────────
function useIsMobile(bp = 768) {
  const [mob, setMob] = useState(() => typeof window !== "undefined" && window.innerWidth < bp);
  useEffect(() => {
    const mq = window.matchMedia(`(max-width: ${bp - 1}px)`);
    const fn = () => setMob(mq.matches);
    fn();
    mq.addEventListener("change", fn);
    return () => mq.removeEventListener("change", fn);
  }, [bp]);
  return mob;
}
function useNarrowMobile(bp = 480) {
  const [narrow, setNarrow] = useState(() => typeof window !== "undefined" && window.innerWidth < bp);
  useEffect(() => {
    const mq = window.matchMedia(`(max-width: ${bp - 1}px)`);
    const fn = () => setNarrow(mq.matches);
    fn();
    mq.addEventListener("change", fn);
    return () => mq.removeEventListener("change", fn);
  }, [bp]);
  return narrow;
}
function adaptGridColumns(cols, narrow=false) {
  if (!cols || cols === "none") return cols;
  const r = cols.match(/repeat\((\d+),\s*([^)]+)\)/);
  if (r) {
    const n = parseInt(r[1], 10);
    if (n >= 4) return narrow ? "1fr" : "repeat(2, 1fr)";
    if (n >= 3) return narrow ? "1fr" : "repeat(2, 1fr)";
    if (n === 2) return "1fr";
  }
  if (/px/.test(cols) || /auto/.test(cols)) return "1fr";
  const frs = cols.match(/\d*\.?\d+fr/g);
  if (frs && frs.length >= 2) return "1fr";
  return cols;
}
function useResponsiveGrids(mainRef, isMobile, tab) {
  const narrow = useNarrowMobile();
  useEffect(() => {
    const root = mainRef.current;
    if (!root) return;
    const apply = () => {
      root.querySelectorAll("div").forEach(el => {
        const cs = window.getComputedStyle(el);
        if (cs.display !== "grid") return;
        if (isMobile) {
          if (!el.dataset.erpGridOrig) el.dataset.erpGridOrig = el.style.gridTemplateColumns || cs.gridTemplateColumns;
          el.style.gridTemplateColumns = adaptGridColumns(el.dataset.erpGridOrig, narrow);
        } else if (el.dataset.erpGridOrig) {
          el.style.gridTemplateColumns = el.dataset.erpGridOrig;
          delete el.dataset.erpGridOrig;
        }
      });
    };
    const t = setTimeout(apply, 0);
    window.addEventListener("resize", apply);
    return () => { clearTimeout(t); window.removeEventListener("resize", apply); };
  }, [isMobile, narrow, tab, mainRef]);
}

const Modal = ({ open, onClose, title, children, width=460 }) => {
  const isMobile = useIsMobile();
  if(!open) return null;
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",
      display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center",zIndex:999,padding:isMobile?0:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.s1,border:`1px solid ${C.borderHi}`,
        borderRadius:isMobile?"20px 20px 0 0":20,padding:isMobile?"20px 16px calc(16px + env(safe-area-inset-bottom, 0px))":28,
        width:isMobile?"100%":width,maxWidth:"100%",maxHeight:isMobile?"92vh":"88vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <span style={{color:C.text,fontFamily:FB,fontSize:isMobile?17:16,fontWeight:700}}>{title}</span>
          <button onClick={onClose} className="erp-nav-btn" style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:10,
            color:C.muted,fontSize:18,cursor:"pointer",lineHeight:1,width:40,height:40}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
};
const Tbl = ({ heads, rows }) => {
  const isMobile = useIsMobile();
  if (isMobile && rows.length > 0) {
    return (
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {rows.map((row,i)=>(
          <div key={i} style={{background:C.s2,borderRadius:12,padding:"12px 14px",border:`1px solid ${C.border}`}}>
            {row.map((cell,j)=>(
              <div key={j} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,
                padding:"6px 0",borderBottom:j<row.length-1?`1px solid ${C.border}`:"none"}}>
                <span style={{color:C.muted,fontSize:11,fontFamily:F,flexShrink:0}}>{heads[j]}</span>
                <span style={{color:C.text,fontSize:13,fontFamily:F,textAlign:"right",wordBreak:"break-word"}}>{cell}</span>
              </div>
            ))}
          </div>
        ))}
      </div>
    );
  }
  return (
    <div className="erp-table-wrap" style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead>
          <tr style={{background:C.s2}}>
            {heads.map((h,i)=>(
              <th key={i} style={{padding:"10px 14px",textAlign:"left",color:C.muted,
                fontSize:11,fontFamily:F,fontWeight:500,borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.length===0
            ?<tr><td colSpan={heads.length} style={{padding:32,textAlign:"center",color:C.muted,fontFamily:F,fontSize:13}}>데이터 없음</td></tr>
            :rows.map((row,i)=>(
              <tr key={i} style={{borderBottom:i<rows.length-1?`1px solid ${C.border}`:"none",transition:"background .12s"}}
                onMouseEnter={e=>e.currentTarget.style.background=C.s2}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                {row.map((cell,j)=><td key={j} style={{padding:"10px 14px",color:C.text,fontFamily:F,fontSize:13}}>{cell}</td>)}
              </tr>
            ))
          }
        </tbody>
      </table>
    </div>
  );
};
const Toggle = ({ on, onChange }) => (
  <div onClick={()=>onChange(!on)} style={{width:38,height:21,borderRadius:11,cursor:"pointer",
    background:on?C.emerald:C.s3,position:"relative",transition:"background .2s",flexShrink:0}}>
    <div style={{position:"absolute",top:2.5,left:on?18:2.5,width:16,height:16,
      borderRadius:"50%",background:"#fff",transition:"left .2s"}}/>
  </div>
);

const fmt = n=>(n||0).toLocaleString("ko-KR");
const today = () => new Date().toISOString().split("T")[0];

const FILTER_INIT = {search:"",role:"전체",zone:"전체",dept:"전체",status:"전체"};
const LIST_PREVIEW = 150;

function matchMember(m, {search="",role="전체",zone="전체",dept="전체",status="전체"}={}) {
  if(role!=="전체"&&m.role!==role) return false;
  if(zone!=="전체"&&m.zone!==zone) return false;
  if(dept!=="전체"&&m.dept!==dept) return false;
  if(status==="활동"&&m.status!=="active") return false;
  if(status==="비활동"&&m.status!=="inactive") return false;
  const q=search.trim().toLowerCase();
  if(!q) return true;
  return [m.name,m.dept,m.zone,m.phone,m.role].some(v=>(v||"").toLowerCase().includes(q));
}
function filterMembers(members, filters, pool) {
  const base=pool?members.filter(pool):members;
  return base.filter(m=>matchMember(m,filters));
}
function hasActiveFilters(f) {
  return !!(f.search?.trim()||f.role!=="전체"||f.zone!=="전체"||f.dept!=="전체"||f.status!=="전체");
}

function useMemberFilters(members, pool) {
  const [filters, setFilters] = useState({...FILTER_INIT});
  const filtered = filterMembers(members, filters, pool);
  const resetFilters = () => setFilters({...FILTER_INIT});
  return {filters, setFilters, filtered, resetFilters, hasFilter:hasActiveFilters(filters)};
}

function MemberFilterBar({filters, setFilters, total, filtered, compact, showStatus=true}) {
  const isMobile = useIsMobile();
  const narrow = useNarrowMobile();
  const set=(k,v)=>setFilters(p=>({...p,[k]:v}));
  const filterCols = isMobile ? (narrow ? "1fr" : "1fr 1fr") : (compact ? "1fr 1fr" : "repeat(auto-fit,minmax(108px,1fr))");
  return (
    <div style={{display:"flex",flexDirection:"column",gap:compact?8:10}}>
      <Inp value={filters.search} onChange={e=>set("search",e.target.value)}
        placeholder="🔍 이름·전화·부서·구역·직분"/>
      <div style={{display:"grid",gridTemplateColumns:filterCols,gap:8}}>
        <Sel value={filters.role} onChange={v=>set("role",v)} opts={["전체",...ROLES]}/>
        <Sel value={filters.zone} onChange={v=>set("zone",v)} opts={["전체",...ZONES,"미배정"]}/>
        <Sel value={filters.dept} onChange={v=>set("dept",v)} opts={["전체",...DEPTS]}/>
        {showStatus&&<Sel value={filters.status} onChange={v=>set("status",v)} opts={["전체","활동","비활동"]}/>}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <span style={{color:C.muted,fontSize:10,fontFamily:F}}>
          {hasActiveFilters(filters)?`검색 결과 ${filtered}명`:`전체 ${total}명`}
          {hasActiveFilters(filters)&&` · 전체 ${total}명 중`}
        </span>
        {hasActiveFilters(filters)&&(
          <Btn sz="sm" v="ghost" onClick={()=>setFilters({...FILTER_INIT})}>필터 초기화</Btn>
        )}
      </div>
    </div>
  );
}

function FilterHint({ total, hasFilter, limit=LIST_PREVIEW }) {
  if(hasFilter||total<=limit) return null;
  return (

function usePersist(key, init) {
  const [state, setState] = useState(() => LS.get(key, typeof init==="function" ? init() : init));
  const set = useCallback(updater => {
    setState(prev => {
      const next = typeof updater==="function" ? updater(prev) : updater;
      LS.set(key, next);
      return next;
    });
  }, [key]);
  return [state, set];
}

function generateMembers(total) {
  const surnames=["김","이","박","최","정","강","조","윤","장","임","한","오","서","신","권","황","안","송","류","홍","문","양","백","허","유","남","심","노","하","곽"];
  const given=["민준","서연","지훈","수진","현우","예원","도윤","하은","시우","지민","준서","서윤","유진","민재","지우","채원","성민","다은","현준","소율","태양","가은","우진","나연","재윤","승현","보라","경호","미래","기쁨"];
  const rolePool=["성도","성도","성도","성도","성도","성도","성도","성도","성도","집사","서리집사","권사","안수집사","장로"];
  const used=new Set(MEMBER_SEEDS.map(m=>m.name));
  const out=[...MEMBER_SEEDS];
  for(let id=MEMBER_SEEDS.length+1; out.length<total; id++){
    const sur=surnames[id%surnames.length];
    const gn=given[(id*3)%given.length];
    let name=sur+gn;
    if(used.has(name)) name=sur+gn+id;
    if(used.has(name)) continue;
    used.add(name);
    const role=rolePool[(id*3)%rolePool.length];
    const inactive=id%13===0;
    const unassigned=id%24===0;
    const zone=unassigned?"미배정":ZONES[(id*5)%ZONES.length];
    const dept=DEPTS[(id*4)%DEPTS.length];
    const year=1995+((id*17)%30);
    const month=String((id%12)+1).padStart(2,"0");
    const day=String((id%27)+1).padStart(2,"0");
    out.push({
      id,name,role,dept,zone,
      phone:`010-${String(1000+(id*37)%9000).padStart(4,"0")}-${String(1000+(id*53)%9000).padStart(4,"0")}`,
      joined:`${year}-${month}-${day}`,
      status:inactive?"inactive":"active",
      roleHistory:[{date:`${year}-${month}-${day}`,role:"성도",event:"등록"}],
      visits:[],
    });
  }
  return out;
}

function useCountUp(target, ms=1000) {
  const num = typeof target === "number" ? target : parseInt(String(target).replace(/\D/g,""),10) || 0;
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (num <= 0) { setVal(0); return; }
    let start = null;
    const tick = ts => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / ms, 1);
      setVal(Math.round(num * (1 - Math.pow(1 - p, 3))));
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [num, ms]);
  return val;
}

  id:"root",name:"사랑의교회",type:"church",expanded:true,
  children:[
    {id:"n1",name:"1교구",type:"교구",expanded:true,children:[

        {id:"n1-1-2",name:"2조",type:"조",children:[]},
        {id:"n1-1-3",name:"3조",type:"조",children:[]},
      ]},
      {id:"n1-2",name:"2구역",type:"구역",expanded:false,children:[]},
    ]},
    {id:"n2",name:"2교구",type:"교구",expanded:false,children:[
      {id:"n2-1",name:"3구역",type:"구역",expanded:false,children:[]},
      {id:"n2-2",name:"4구역",type:"구역",expanded:false,children:[]},
    ]},
    {id:"dept",name:"부서",type:"분류",expanded:true,children:DEPTS.map((d,i)=>({id:`d${i+1}`,name:d,type:"부서",children:[]}))},
    {id:"assoc",name:"자치회",type:"분류",expanded:false,children:[
      {id:"a1",name:"남선교회",type:"자치회",children:[]},
      {id:"a2",name:"여선교회",type:"자치회",children:[]},
      {id:"a3",name:"청년선교회",type:"자치회",children:[]},
    ]},
  ]
};
const typeC = t=>({church:C.gold,교구:C.violet,구역:C.emerald,조:C.sky,목장:C.emerald,셀:C.sky,부서:C.amber,자치회:C.rose,분류:C.muted}[t]||C.sub);
const ORG_TYPES = ["교구","구역","조","목장","셀","진","부서","자치회"];
const countOrgNodes = node => 1 + (node.children?.reduce((s,c)=>s+countOrgNodes(c),0)||0);

function TreeNode({ node, depth=0, onToggle, onAdd, onDel }) {
  const [hover, setHover] = useState(false);
  return (
    <div style={{marginLeft:depth>0?18:0}}>
      <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
        style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",borderRadius:9,
          marginBottom:2,background:hover?C.s2:"transparent",transition:"background .12s"}}>
        <span onClick={()=>node.children?.length&&onToggle(node.id)}
          style={{cursor:node.children?.length?"pointer":"default",color:C.muted,width:14,fontSize:10,flexShrink:0}}>
          {node.children?.length?(node.expanded?"▾":"▸"):""}
        </span>
        <div style={{width:7,height:7,borderRadius:"50%",background:typeC(node.type),flexShrink:0}}/>
        <span style={{color:C.text,fontSize:13,fontFamily:F,flex:1}}>{node.name}</span>
        <Badge c={typeC(node.type)}>{node.type}</Badge>
        {hover&&node.id!=="root"&&(
          <>
            <Btn sz="sm" v="ghost" onClick={()=>onAdd(node.id)} style={{marginLeft:4}}>+하위</Btn>
            <Btn sz="sm" v="rose" onClick={()=>onDel(node.id)}>삭제</Btn>
          </>
        )}
        {hover&&node.id==="root"&&<Btn sz="sm" v="ghost" onClick={()=>onAdd(node.id)}>+추가</Btn>}
      </div>
      {node.expanded&&node.children?.map(c=>(
        <TreeNode key={c.id} node={c} depth={depth+1} onToggle={onToggle} onAdd={onAdd} onDel={onDel}/>
      ))}
    </div>
  );
}

function OrgTreeTab({ members }) {
  const [tree, setTree] = usePersist("erp_org", ORG_INIT);
  const [addTarget, setAddTarget] = useState(null);
  const [newName, setNewName] = useState("");
  const [newType, setNewType] = useState("구역");

  const toggle = id => {
    const go = n=>n.id===id?{...n,expanded:!n.expanded}:{...n,children:n.children?.map(go)};
    setTree(go);
  };
  const addChild = parentId => { setAddTarget(parentId); setNewName(""); };
  const confirmAdd = () => {
    if(!newName.trim()) return;
    const node={id:`n${Date.now()}`,name:newName,type:newType,expanded:false,children:[]};
    const go = n=>n.id===addTarget?{...n,expanded:true,children:[...(n.children||[]),node]}:{...n,children:n.children?.map(go)};
    setTree(go); setAddTarget(null);
  };
  const delNode = id => {
    const go = n=>({...n,children:n.children?.filter(c=>c.id!==id).map(go)});
    setTree(go);
  };

  const orgStats = (() => {
    const unassigned = members.filter(m=>m.status==="active"&&(m.zone==="미배정"||!m.zone)).length;
    const deptCount = new Set(members.filter(m=>m.dept).map(m=>m.dept)).size;
    return [
      {l:"등록 성도",v:`${members.length}명`,c:C.violet},
      {l:"활동 성도",v:`${members.filter(m=>m.status==="active").length}명`,c:C.emerald},
      {l:"미배정 성도",v:`${unassigned}명`,c:C.rose},
      {l:"조직 노드",v:`${countOrgNodes(tree)}개`,c:C.sky},
      {l:"부서 수",v:`${deptCount}개`,c:C.amber},
    ];
  })();

  return (
    <div style={{display:"grid",gridTemplateColumns:"1.2fr 1fr",gap:20}}>
      <Card style={{padding:22}}>
        <SH title="커스텀 계층 조직도" sub="교회별 명칭 자유 설정 — 목장·셀·구역·진 모두 가능"
          action={<Badge c={C.violet}>Flexible Hierarchy</Badge>}/>
        <div style={{background:C.s2,borderRadius:12,padding:14,maxHeight:500,overflowY:"auto"}}>
          <TreeNode node={tree} onToggle={toggle} onAdd={addChild} onDel={delNode}/>
        </div>
        <div style={{marginTop:12,background:`${C.violet}0D`,borderRadius:10,padding:"12px 14px",
          border:`1px solid ${C.violet}22`}}>
          <div style={{color:C.violet,fontSize:11,fontFamily:F,fontWeight:600,marginBottom:3}}>💡 DB 설계</div>
          <code style={{color:C.sky,fontSize:11}}>org_nodes(id, parent_id, name, type, order)</code>
          <div style={{color:C.muted,fontSize:11,fontFamily:F,marginTop:2}}>재귀 CTE로 전체 트리 조회</div>
        </div>
      </Card>

      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Card style={{padding:20}}>
          <SH title="조직 현황"/>
          {orgStats.map(x=>(
            <div key={x.l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
              <span style={{color:C.sub,fontSize:13,fontFamily:F}}>{x.l}</span>
              <span style={{color:x.c,fontWeight:700,fontFamily:F}}>{x.v}</span>
            </div>
          ))}
        </Card>
        <Card style={{padding:20}}>
          <SH title="Supabase 인덱스 전략" sub="대형 교회 대응"/>
          {["idx_members_org_node — 소속 조회","idx_offerings_date — 날짜 범위","idx_attend_member_date — 출석 복합","idx_access_log_ts — 보안 로그"].map((x,i)=>(
            <div key={i} style={{background:C.s3,borderRadius:8,padding:"7px 11px",marginBottom:7}}>
              <code style={{color:C.sky,fontSize:11}}>{x}</code>
            </div>
          ))}
        </Card>
      </div>

      <Modal open={!!addTarget} onClose={()=>setAddTarget(null)} title="하위 조직 추가" width={340}>
        <div style={{display:"flex",flexDirection:"column",gap:13}}>
          <div>
            <label style={{color:C.muted,fontSize:12,fontFamily:F,display:"block",marginBottom:5}}>조직 명칭</label>
            <Inp value={newName} onChange={e=>setNewName(e.target.value)} placeholder="예: 3구역, 목장A"/>
          </div>
          <div>
            <label style={{color:C.muted,fontSize:12,fontFamily:F,display:"block",marginBottom:5}}>유형</label>
            <Sel value={newType} onChange={setNewType} opts={ORG_TYPES}/>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}>
            <Btn v="ghost" onClick={()=>setAddTarget(null)}>취소</Btn>
            <Btn v="primary" onClick={confirmAdd}>추가</Btn>
          </div>
        </div>
      </Modal>
    </div>
  );
}

// ══ MEMBERS TAB — SOLID ════════════════════════════════
function MembersTab({ members, setMembers }) {
  const {filters, setFilters, filtered, hasFilter} = useMemberFilters(members);
  const listMembers = hasFilter ? filtered : filtered.slice(0, LIST_PREVIEW);
  const [sel, setSel] = useState(null);
  const [dTab, setDTab] = useState("profile");
  const [addModal, setAddModal] = useState(false);
  const [visitModal, setVisitModal] = useState(false);
  const [editModal, setEditModal] = useState(false);
  const [accessReason, setAccessReason] = useState("");
  const [accessGranted, setAccessGranted] = useState(false);
  const [delConfirm, setDelConfirm] = useState(null);
  const [errors, setErrors] = useState({});
  const [form, setForm] = useState({name:"",role:"성도",dept:DEPTS[0],zone:ZONES[0],phone:"",joined:today()});
  const [vForm, setVForm] = useState({date:today(),pastor:"",scripture:"",prayer:"",note:""});

  const validateForm = () => {
    const e={};
    if(!V.required(form.name)) e.name="이름을 입력해주세요";
    if(form.phone && !V.phone(form.phone)) e.phone="010-0000-0000 형식으로 입력해주세요";
    if(!V.date(form.joined)) e.joined="올바른 날짜를 선택해주세요";
    setErrors(e);
    return Object.keys(e).length===0;
  };

  const addMember = () => {
    if(!validateForm()) { toast.error("입력 내용을 확인해주세요"); return; }
    const m={...form,id:Date.now(),status:"active",
      roleHistory:[{date:form.joined,role:form.role,event:"등록"}],visits:[]};
    setMembers(p=>[...p,m]);
    toast.success(`${form.name} 성도가 등록되었습니다`);
    setAddModal(false);
    setForm({name:"",role:"성도",dept:DEPTS[0],zone:ZONES[0],phone:"",joined:today()});
    setErrors({});
  };

  const updateMember = () => {
    if(!validateForm()) { toast.error("입력 내용을 확인해주세요"); return; }
    setMembers(p=>p.map(m=>m.id===sel.id?{...m,...form}:m));
    setSel(prev=>({...prev,...form}));
    toast.success("성도 정보가 수정되었습니다");
    setEditModal(false); setErrors({});
  };

  const deleteMember = (id, name) => {
    setMembers(p=>p.filter(m=>m.id!==id));
    if(sel?.id===id) setSel(null);
    toast.success(`${name} 성도가 삭제되었습니다`);
    setDelConfirm(null);
  };

  const toggleStatus = (id) => {
    setMembers(p=>p.map(m=>m.id===id?{...m,status:m.status==="active"?"inactive":"active"}:m));
    const m = members.find(x=>x.id===id);
    toast.info(`${m?.name} 성도 상태가 변경되었습니다`);
  };

  const addVisit = () => {
    if(!V.required(vForm.pastor)) { toast.error("담당 교역자를 입력해주세요"); return; }
    if(!V.required(vForm.prayer)) { toast.error("기도 제목을 입력해주세요"); return; }
    setMembers(p=>p.map(m=>m.id===sel.id?{...m,visits:[...m.visits,{...vForm}]}:m));
    setSel(prev=>({...prev,visits:[...prev.visits,{...vForm}]}));
    toast.success("심방 기록이 저장되었습니다");
    setVisitModal(false);
    setVForm({date:today(),pastor:"",scripture:"",prayer:"",note:""});
  };

  const openEdit = (m) => {
    setForm({name:m.name,role:m.role,dept:m.dept,zone:m.zone,phone:m.phone,joined:m.joined});
    setErrors({}); setEditModal(true);
  };

  const selectedMember = sel ? members.find(m=>m.id===sel.id)||sel : null;

  return (
    <div style={{display:"grid",gridTemplateColumns:"300px 1fr",gap:18,minHeight:560}}>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <MemberFilterBar filters={filters} setFilters={setFilters} total={members.length} filtered={filtered.length}/>
        <FilterHint total={members.length} hasFilter={hasFilter}/>
        <Btn v="primary" onClick={()=>{setErrors({});setAddModal(true);}} style={{width:"100%",justifyContent:"center"}}>+ 성도 등록</Btn>
        <div style={{display:"flex",flexDirection:"column",gap:5,overflowY:"auto",maxHeight:420}}>
          {listMembers.length===0?(

            <div key={m.id} onClick={()=>{setSel(m);setDTab("profile");setAccessGranted(false);setAccessReason("");}}

                border:`1px solid ${selectedMember?.id===m.id?C.violet:C.border}`,

                </div>

              <div style={{color:C.muted,fontSize:11,fontFamily:F,marginTop:3}}>{m.dept} · {m.zone}</div>

          ))}
        </div>
      </div>

      {selectedMember?(
        <Card style={{padding:22}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{display:"flex",gap:6}}>
              {[{k:"profile",l:"👤 기본정보"},{k:"history",l:"📜 직분이력"},{k:"visit",l:"🏠 심방기록"}].map(t=>(
                <button key={t.k} onClick={()=>setDTab(t.k)} style={{
                  padding:"7px 16px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:F,fontSize:12,
                  background:dTab===t.k?C.violet:C.s2,color:dTab===t.k?"#fff":C.sub}}>
                  {t.l}
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:6}}>
              <Btn sz="sm" v="ghost" onClick={()=>openEdit(selectedMember)}>✏️ 수정</Btn>
              <Btn sz="sm" v="ghost" onClick={()=>toggleStatus(selectedMember.id)}>
                {selectedMember.status==="active"?"비활동 처리":"활동 복귀"}
              </Btn>
              <Btn sz="sm" v="rose" onClick={()=>setDelConfirm(selectedMember)}>삭제</Btn>
            </div>
          </div>

          {dTab==="profile"&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[{l:"이름",v:selectedMember.name},{l:"직분",v:<Badge c={roleC(selectedMember.role)}>{selectedMember.role}</Badge>},
                {l:"부서",v:selectedMember.dept},{l:"구역",v:selectedMember.zone},
                {l:"연락처",v:selectedMember.phone||"미등록"},{l:"등록일",v:selectedMember.joined},
                {l:"상태",v:<Badge c={selectedMember.status==="active"?C.emerald:C.muted}>{selectedMember.status==="active"?"활동":"비활동"}</Badge>},

          {dTab==="visit"&&(
            <div>
              <SH title="심방 기록" sub="담당 교역자 전용"
                action={<Btn sz="sm" v="ghost" onClick={()=>setVisitModal(true)}>+ 심방 추가</Btn>}/>
              {!accessGranted?(
                <div style={{background:`${C.rose}0D`,border:`1px solid ${C.rose}33`,borderRadius:12,padding:22,textAlign:"center"}}>
                  <div style={{fontSize:32,marginBottom:10}}>🔐</div>
                  <div style={{color:C.text,fontSize:13,fontFamily:F,fontWeight:600,marginBottom:6}}>열람 보안 인증</div>
                  <div style={{color:C.muted,fontSize:11,fontFamily:F,marginBottom:14}}>
                    열람 사유를 입력하세요 (5자 이상)<br/>관리자에게 자동 알림이 발송됩니다
                  </div>
                  <Inp value={accessReason} onChange={e=>setAccessReason(e.target.value)}
                    placeholder="열람 사유 입력" style={{maxWidth:280,margin:"0 auto 12px"}}/>
                  <Btn v="primary" disabled={!V.minLen(accessReason,5)}
                    onClick={()=>{setAccessGranted(true);toast.info("접근 로그가 기록되었습니다");}}>
                    열람 요청
                  </Btn>
                </div>
              ):(
                <div>
                  <div style={{background:`${C.emerald}11`,borderRadius:8,padding:"7px 12px",
                    marginBottom:14,color:C.emerald,fontSize:11,fontFamily:F}}>
                    ✅ {accessReason} — 접근 로그 기록됨
                  </div>
                  {(!selectedMember.visits||selectedMember.visits.length===0)
                    ?<div style={{color:C.muted,textAlign:"center",padding:24,fontFamily:F,fontSize:13}}>심방 기록 없음</div>
                    :selectedMember.visits.map((v,i)=>(
                      <div key={i} style={{background:C.s2,borderRadius:11,padding:"14px 16px",marginBottom:10}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                          <span style={{color:C.violet,fontSize:12,fontFamily:F,fontWeight:600}}>{v.date}</span>
                          <span style={{color:C.muted,fontSize:11,fontFamily:F}}>담당: {v.pastor}</span>
                        </div>
                        {[{l:"📖 말씀",v:v.scripture},{l:"🙏 기도",v:v.prayer},{l:"📝 메모",v:v.note}].map(f=>(
                          f.v&&<div key={f.l} style={{marginBottom:4}}>
                            <span style={{color:C.muted,fontSize:11}}>{f.l}: </span>
                            <span style={{color:C.sub,fontSize:12,fontFamily:F}}>{f.v}</span>
                          </div>
                        ))}
                      </div>
                    ))
                  }
                </div>
              )}
            </div>
          )}
        </Card>
      ):(
        <Card style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:400}}>
          <div style={{textAlign:"center",color:C.muted,fontFamily:F,fontSize:13}}>
            <div style={{fontSize:40,marginBottom:10}}>👈</div>좌측에서 성도 선택
          </div>
        </Card>
      )}

      {/* 성도 등록 모달 */}
      <Modal open={addModal} onClose={()=>{setAddModal(false);setErrors({});}} title="신규 성도 등록">
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Field label="이름" error={errors.name} required>
            <Inp value={form.name} error={!!errors.name}
              onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="성도 이름"/>
          </Field>
          <Field label="연락처 (010-0000-0000)" error={errors.phone}>
            <Inp value={form.phone} error={!!errors.phone}
              onChange={e=>setForm(p=>({...p,phone:phoneFormat(e.target.value)}))} placeholder="010-0000-0000"/>
          </Field>
          <Field label="등록일" error={errors.joined} required>
            <Inp type="date" value={form.joined} error={!!errors.joined}
              onChange={e=>setForm(p=>({...p,joined:e.target.value}))}/>
          </Field>
          {[{l:"직분",k:"role",opts:ROLES},{l:"부서",k:"dept",opts:DEPTS},{l:"구역",k:"zone",opts:ZONES}].map(f=>(
            <div key={f.k}>
              <label style={{color:C.muted,fontSize:11,fontFamily:F,display:"block",marginBottom:4}}>{f.l}</label>
              <Sel value={form[f.k]} onChange={v=>setForm(p=>({...p,[f.k]:v}))} opts={f.opts}/>
            </div>
          ))}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
            <Btn v="ghost" onClick={()=>{setAddModal(false);setErrors({});}}>취소</Btn>
            <Btn v="primary" onClick={addMember}>등록</Btn>
          </div>
        </div>
      </Modal>

      {/* 수정 모달 */}
      <Modal open={editModal} onClose={()=>{setEditModal(false);setErrors({});}} title="성도 정보 수정">
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Field label="이름" error={errors.name} required>
            <Inp value={form.name} error={!!errors.name}
              onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="성도 이름"/>
          </Field>
          <Field label="연락처" error={errors.phone}>
            <Inp value={form.phone} error={!!errors.phone}
              onChange={e=>setForm(p=>({...p,phone:phoneFormat(e.target.value)}))} placeholder="010-0000-0000"/>
          </Field>
          {[{l:"직분",k:"role",opts:ROLES},{l:"부서",k:"dept",opts:DEPTS},{l:"구역",k:"zone",opts:ZONES}].map(f=>(
            <div key={f.k}>
              <label style={{color:C.muted,fontSize:11,fontFamily:F,display:"block",marginBottom:4}}>{f.l}</label>
              <Sel value={form[f.k]} onChange={v=>setForm(p=>({...p,[f.k]:v}))} opts={f.opts}/>
            </div>
          ))}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
            <Btn v="ghost" onClick={()=>{setEditModal(false);setErrors({});}}>취소</Btn>
            <Btn v="primary" onClick={updateMember}>저장</Btn>
          </div>
        </div>
      </Modal>

      {/* 심방 모달 */}
      <Modal open={visitModal} onClose={()=>setVisitModal(false)} title="심방 기록 추가" width={420}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {[{l:"심방 일자",k:"date",t:"date"},{l:"담당 교역자 *",k:"pastor",t:"text"},
            {l:"말씀 본문",k:"scripture",t:"text"},{l:"기도 제목 *",k:"prayer",t:"text"}].map(f=>(
            <div key={f.k}>
              <label style={{color:C.muted,fontSize:11,fontFamily:F,display:"block",marginBottom:4}}>{f.l}</label>
              <Inp type={f.t} value={vForm[f.k]} onChange={e=>setVForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.l}/>
            </div>
          ))}
          <div>
            <label style={{color:C.muted,fontSize:11,fontFamily:F,display:"block",marginBottom:4}}>메모 (비공개)</label>
            <textarea value={vForm.note} onChange={e=>setVForm(p=>({...p,note:e.target.value}))}
              style={{width:"100%",background:C.s2,border:`1px solid ${C.border}`,borderRadius:9,
                padding:"8px 12px",color:C.text,fontFamily:F,fontSize:12,outline:"none",
                resize:"vertical",minHeight:70,boxSizing:"border-box"}}/>
          </div>
          <div style={{background:`${C.rose}0D`,borderRadius:8,padding:"8px 12px",color:C.rose,fontSize:11,fontFamily:F}}>
            🔒 담당 교역자만 열람 가능 (RLS 적용 예정)
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn v="ghost" onClick={()=>setVisitModal(false)}>취소</Btn>
            <Btn v="primary" onClick={addVisit} disabled={!V.required(vForm.pastor)||!V.required(vForm.prayer)}>저장</Btn>
          </div>
        </div>
      </Modal>

      {/* 삭제 확인 */}
      <ConfirmDialog
        open={!!delConfirm}
        title="성도 삭제"
        message={`${delConfirm?.name} 성도를 삭제하시겠습니까?\n삭제된 데이터는 복구할 수 없습니다.`}
        confirmText="삭제"
        confirmV="rose"
        onConfirm={()=>deleteMember(delConfirm.id, delConfirm.name)}
        onCancel={()=>setDelConfirm(null)}
      />
    </div>
  );
}
// ══ 4. ATTEND TAB v6 — 새벽기도 추가 ══════════════════
function AttendTab({ members, attend, setAttend }) {
  const [selWeek, setSelWeek] = useState(WEEKS[0]);
  const [selService, setSelService] = useState("sunday"); // sunday | wednesday | dawn
  const [addWeekModal, setAddWeekModal] = useState(false);
  const [delWeekConfirm, setDelWeekConfirm] = useState(null);
  const [newWeek, setNewWeek] = useState(today());
  const [newServiceType, setNewServiceType] = useState("sunday");
  const activeM = members.filter(m=>m.status==="active");
  const {filters, setFilters, filtered: filteredActive, hasFilter} = useMemberFilters(members, m=>m.status==="active");
  const visibleM = hasFilter ? filteredActive : filteredActive.slice(0, LIST_PREVIEW);

  const SERVICES = [
    {k:"sunday",  l:"주일 예배",   color:C.violet},
    {k:"wednesday",l:"수요 예배",  color:C.sky},
    {k:"dawn",    l:"새벽 기도회", color:C.gold},
  ];

  // 주일 예배 필드
  const SUNDAY_FIELDS = [
    {k:"s1",       l:"1부 예배",   c:C.violet},
    {k:"s2",       l:"2부 예배",   c:C.sky},
    {k:"online",   l:"온라인",     c:C.emerald},
    {k:"communion",l:"성찬 참여",  c:C.gold},
  ];
  // 수요 예배 필드
  const WED_FIELDS = [
    {k:"wed",      l:"수요 예배",  c:C.sky},
    {k:"wedOnline",l:"온라인",     c:C.emerald},
  ];
  // 새벽기도 필드 (월~토 각각)
  const DAWN_FIELDS = [
    {k:"mon",l:"월",c:C.violet},{k:"tue",l:"화",c:C.sky},
    {k:"wed2",l:"수",c:C.emerald},{k:"thu",l:"목",c:C.gold},
    {k:"fri",l:"금",c:C.rose},{k:"sat",l:"토",c:C.amber},
  ];

  const currentFields = selService==="sunday"?SUNDAY_FIELDS:selService==="wednesday"?WED_FIELDS:DAWN_FIELDS;
  const defaultA = (svc) => {
    const f = svc==="sunday"?SUNDAY_FIELDS:svc==="wednesday"?WED_FIELDS:DAWN_FIELDS;
    return f.reduce((a,x)=>({...a,[x.k]:false}),{});
  };

  const toggleAttend = (member, field) => {
    setAttend(prev=>{
      const key = `${selWeek}_${selService}`;
      const wk = {...(prev[key]||{})};
      const cur = {...(wk[member]||defaultA(selService))};
      cur[field] = !cur[field];
      wk[member] = cur;
      return {...prev,[key]:wk};
    });
    toast.success(`${member} — ${field} 출석 변경`);
  };

  const markAll = (field, val) => {
    setAttend(prev=>{
      const key = `${selWeek}_${selService}`;
      const wk = {...(prev[key]||{})};
      visibleM.forEach(m=>{
        wk[m.name] = {...(wk[m.name]||defaultA(selService)),[field]:val};
      });
      return {...prev,[key]:wk};
    });
    toast.success(`${field} ${hasFilter?"선택":"전체"} ${val?"체크":"해제"} 완료`);
  };

  const addWeek = () => {
    if(!newWeek) return;
    const key = `${newWeek}_${newServiceType}`;
    if(attend[key]) { toast.warn("이미 등록된 날짜/예배입니다"); return; }
    const init={};
    activeM.forEach(m=>{init[m.name]=defaultA(newServiceType);});
    setAttend(prev=>({...prev,[key]:init}));
    setSelWeek(newWeek); setSelService(newServiceType);
    setAddWeekModal(false);
    toast.success("출석부가 추가되었습니다");
  };

  const deleteWeek = (weekKey) => {
    setAttend(prev=>{ const n={...prev}; delete n[weekKey]; return n; });
    toast.info("출석부가 삭제되었습니다");
    setDelWeekConfirm(null);
    // 다른 주로 이동
    const remaining = Object.keys(attend).filter(k=>k!==weekKey);
    if(remaining.length) setSelWeek(remaining[0].split("_")[0]);
  };

  const wkKey = `${selWeek}_${selService}`;
  const wkData = attend[wkKey]||{};

  // 통계 계산
  const fieldCounts = currentFields.map(f=>({
    ...f,
    cnt: visibleM.filter(m=>wkData[m.name]?.[f.k]).length
  }));
  const totalAttend = visibleM.filter(m=>currentFields.some(f=>wkData[m.name]?.[f.k])).length;
  const statsBase = visibleM.length || 1;

  // 날짜 목록 (서비스별 분리)
  const allKeys = Object.keys(attend).sort((a,b)=>b.localeCompare(a));
  const sundayKeys  = allKeys.filter(k=>k.endsWith("_sunday"));
  const wedKeys     = allKeys.filter(k=>k.endsWith("_wednesday"));
  const dawnKeys    = allKeys.filter(k=>k.endsWith("_dawn"));
  const currentKeys = selService==="sunday"?sundayKeys:selService==="wednesday"?wedKeys:dawnKeys;

  // 새벽기도 주간 통계
  const dawnStats = selService==="dawn" ? visibleM.map(m=>({
    name:m.name, role:m.role, zone:m.zone,
    total: DAWN_FIELDS.filter(f=>wkData[m.name]?.[f.k]).length,
  })).sort((a,b)=>b.total-a.total) : [];

  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      {/* 예배 종류 선택 */}
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {SERVICES.map(s=>(
          <button key={s.k} onClick={()=>setSelService(s.k)} style={{
            padding:"9px 20px",borderRadius:11,border:"none",cursor:"pointer",fontFamily:F,fontSize:13,fontWeight:600,
            background:selService===s.k?s.color:C.s2,
            color:selService===s.k?"#fff":C.sub,transition:"all .15s"}}>
            {s.l}
          </button>
        ))}
        <Btn sz="sm" v="ghost" onClick={()=>setAddWeekModal(true)} style={{marginLeft:"auto"}}>+ 날짜 추가</Btn>
      </div>

      <Card style={{padding:16}}>
        <MemberFilterBar filters={filters} setFilters={setFilters} total={activeM.length} filtered={filteredActive.length} compact showStatus={false}/>
        <FilterHint total={activeM.length} hasFilter={hasFilter}/>
      </Card>

      {/* 날짜 선택 */}
      {currentKeys.length>0 ? (
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          {currentKeys.map(k=>{
            const dateStr = k.split("_")[0];
            return (
              <div key={k} style={{display:"flex",gap:2,alignItems:"center"}}>
                <button onClick={()=>setSelWeek(dateStr)} style={{
                  padding:"6px 14px",borderRadius:16,border:"none",cursor:"pointer",fontFamily:F,fontSize:12,
                  background:selWeek===dateStr&&selService===k.split("_")[1]?SERVICES.find(s=>s.k===selService)?.color||C.violet:C.s2,
                  color:selWeek===dateStr&&selService===k.split("_")[1]?"#fff":C.sub,transition:"all .15s"}}>
                  {dateStr}
                </button>
                <button onClick={()=>setDelWeekConfirm(k)} style={{
                  background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12,padding:"2px 4px"}}>✕</button>
              </div>
            );
          })}
        </div>
      ):(
        <div style={{background:C.s2,borderRadius:10,padding:"14px 18px",color:C.muted,fontSize:13,fontFamily:F,textAlign:"center"}}>
          등록된 {SERVICES.find(s=>s.k===selService)?.l} 출석부 없음 — "날짜 추가" 버튼을 눌러주세요
        </div>
      )}

      {/* 요약 카드 */}
      <div style={{display:"grid",gridTemplateColumns:`repeat(${currentFields.length+1},1fr)`,gap:10}}>
        <Card style={{padding:"13px 16px"}}>
          <div style={{color:C.muted,fontSize:10,fontFamily:F,marginBottom:3}}>전체 출석</div>
          <div style={{color:C.text,fontSize:20,fontWeight:700,fontFamily:F}}>{totalAttend}명</div>
          <div style={{color:C.muted,fontSize:10,fontFamily:F}}>{Math.round(totalAttend/statsBase*100)}%</div>
        </Card>
        {fieldCounts.map(x=>(
          <Card key={x.k} style={{padding:"13px 16px"}}>
            <div style={{color:C.muted,fontSize:10,fontFamily:F,marginBottom:3}}>{x.l}</div>
            <div style={{color:x.c,fontSize:20,fontWeight:700,fontFamily:F}}>{x.cnt}명</div>
            <div style={{color:x.c,fontSize:10,fontFamily:F}}>{Math.round(x.cnt/statsBase*100)}%</div>
          </Card>
        ))}
      </div>

      {/* 새벽기도 주간 랭킹 */}
      {selService==="dawn"&&dawnStats.length>0&&(
        <Card style={{padding:20}}>

  const [addItemModal, setAddItemModal] = useState(false);
  const [addBudgetModal, setAddBudgetModal] = useState(false);
  const [iForm, setIForm] = useState({title:"",amount:"",reqBy:"",date:today()});
  const [bForm, setBForm] = useState({dept:"",cat:"",budget:""});

  const dept = budgets[selIdx];
  const spent = dept ? dept.items.filter(i=>i.status==="approved").reduce((s,i)=>s+i.amount,0) : 0;
  const rate = dept ? spent/dept.budget : 0;

  const approveItem = id => {
    setBudgets(p=>p.map((b,i)=>i===selIdx?{...b,items:b.items.map(it=>it.id===id?{...it,status:"approved"}:it)}:b));
    setApproveTarget(null);
  };
  const rejectItem = id => {
    setBudgets(p=>p.map((b,i)=>i===selIdx?{...b,items:b.items.map(it=>it.id===id?{...it,status:"rejected"}:it)}:b));
    setRejectTarget(null);
  };
  const addItem = () => {
    if(!iForm.title.trim()||!iForm.amount) return;
    const newItem={...iForm,id:`i${Date.now()}`,amount:parseInt(iForm.amount),status:"pending"};
    setBudgets(p=>p.map((b,i)=>i===selIdx?{...b,items:[...b.items,newItem]}:b));
    setAddItemModal(false);
    setIForm({title:"",amount:"",reqBy:"",date:today()});
  };
  const addBudget = () => {
    if(!bForm.dept.trim()||!bForm.budget) return;
    setBudgets(p=>[...p,{id:`B${Date.now()}`,dept:bForm.dept,cat:bForm.cat,budget:parseInt(bForm.budget),items:[]}]);
    setAddBudgetModal(false);
    setBForm({dept:"",cat:"",budget:""});
  };

  if(!dept) return <div style={{color:C.muted,fontFamily:F,textAlign:"center",padding:40}}>부서 없음</div>;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      {/* 부서 탭 */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        {budgets.map((b,i)=>{
          const s=b.items.filter(x=>x.status==="approved").reduce((a,x)=>a+x.amount,0);
          const r=s/b.budget;
          return (
            <button key={b.id} onClick={()=>setSelIdx(i)} style={{
              padding:"9px 18px",borderRadius:11,border:"none",cursor:"pointer",fontFamily:F,fontSize:13,fontWeight:600,
              background:selIdx===i?C.violet:C.s2,color:selIdx===i?"#fff":C.sub,
              position:"relative",transition:"all .15s"}}>
              {b.dept}
              {r>0.9&&<span style={{marginLeft:5,fontSize:10}}>⚠️</span>}
            </button>
          );
        })}
        <Btn sz="sm" v="ghost" onClick={()=>setAddBudgetModal(true)}>+ 부서 추가</Btn>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"260px 1fr",gap:18}}>
        {/* 게이지 */}
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Card style={{padding:20}}>
            <SH title={`${dept.dept} 예산`} sub={dept.cat}/>
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{width:110,height:110,borderRadius:"50%",margin:"0 auto",
                background:`conic-gradient(${rate>0.9?C.rose:rate>0.7?C.amber:C.emerald} ${Math.round(rate*360)}deg,${C.s3} 0deg)`,
                display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
                <div style={{width:82,height:82,borderRadius:"50%",background:C.s1,
                  display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
                  <span style={{color:rate>0.9?C.rose:rate>0.7?C.amber:C.emerald,fontSize:18,fontWeight:700,fontFamily:F}}>
                    {Math.round(rate*100)}%
                  </span>
                  <span style={{color:C.muted,fontSize:9,fontFamily:F}}>집행률</span>
                </div>
              </div>
            </div>
            {[{l:"총 예산",v:`₩${fmt(dept.budget)}`,c:C.text},
              {l:"집행액",v:`₩${fmt(spent)}`,c:rate>0.9?C.rose:C.amber},
              {l:"잔여",v:`₩${fmt(dept.budget-spent)}`,c:C.emerald}].map(x=>(
              <div key={x.l} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
                <span style={{color:C.muted,fontSize:12,fontFamily:F}}>{x.l}</span>
                <span style={{color:x.c,fontWeight:700,fontFamily:F,fontSize:12}}>{x.v}</span>
              </div>
            ))}
            {rate>0.9&&<div style={{marginTop:12,background:`${C.rose}11`,borderRadius:8,padding:"8px 12px",
              color:C.rose,fontSize:11,fontFamily:F}}>⚠️ 예산 90% 초과 — 관리자 승인 필요</div>}
          </Card>
          <Card style={{padding:18}}>
            <SH title="결의 프로세스"/>
            {["부서장 요청","1차 담당 검토","재정부장 승인","집행 완료"].map((step,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0"}}>
                <div style={{width:20,height:20,borderRadius:"50%",flexShrink:0,
                  background:i<3?`${C.violet}22`:C.s3,border:`1px solid ${i<3?C.violet:C.border}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  color:i<3?C.violet:C.muted,fontSize:10,fontWeight:700}}>{i+1}</div>
                <span style={{color:i<3?C.sub:C.muted,fontSize:12,fontFamily:F}}>{step}</span>
              </div>
            ))}
          </Card>
        </div>

        {/* 결의 목록 */}
        <Card style={{padding:20}}>
          <SH title="지출 결의서" action={<Btn sz="sm" v="primary" onClick={()=>setAddItemModal(true)}>+ 지출 요청</Btn>}/>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {dept.items.length===0
              ?<div style={{color:C.muted,textAlign:"center",padding:24,fontFamily:F,fontSize:13}}>결의서 없음</div>
              :dept.items.map(item=>(
                <div key={item.id} style={{background:C.s2,borderRadius:11,padding:"14px 16px",
                  borderLeft:`3px solid ${stC(item.status)}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div>
                      <div style={{color:C.text,fontSize:13,fontFamily:F,fontWeight:600}}>{item.title}</div>
                      <div style={{color:C.muted,fontSize:11,fontFamily:F,marginTop:2}}>요청: {item.reqBy} · {item.date}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{color:C.gold,fontSize:15,fontWeight:700,fontFamily:F}}>₩{fmt(item.amount)}</div>
                      <Badge c={stC(item.status)}>{stL(item.status)}</Badge>
                    </div>
                  </div>
                  {item.status==="pending"&&(
                    <div style={{display:"flex",gap:6,marginTop:6}}>
                      <Btn sz="sm" v="emerald" onClick={()=>setApproveTarget(item)}>✓ 승인</Btn>
                      <Btn sz="sm" v="rose" onClick={()=>setRejectTarget(item)}>✕ 반려</Btn>
                    </div>
                  )}
                </div>
              ))
            }
          </div>
        </Card>
      </div>

      {/* 모달들 */}
      <Modal open={!!approveTarget} onClose={()=>setApproveTarget(null)} title="지출 결의 승인" width={380}>
        {approveTarget&&(
          <div>
            <div style={{background:C.s2,borderRadius:11,padding:14,marginBottom:14}}>
              <div style={{color:C.text,fontFamily:F,fontWeight:600,marginBottom:4}}>{approveTarget.title}</div>
              <div style={{color:C.gold,fontSize:17,fontWeight:700,fontFamily:F}}>₩{fmt(approveTarget.amount)}</div>
            </div>
            <div style={{color:C.muted,fontSize:12,fontFamily:F,marginBottom:16}}>승인 시 예산에서 즉시 차감되며 취소할 수 없습니다.</div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <Btn v="ghost" onClick={()=>setApproveTarget(null)}>취소</Btn>
              <Btn v="emerald" onClick={()=>approveItem(approveTarget.id)}>최종 승인</Btn>
            </div>
          </div>
        )}
      </Modal>
      <Modal open={!!rejectTarget} onClose={()=>setRejectTarget(null)} title="반려 확인" width={340}>
        {rejectTarget&&(
          <div>
            <div style={{color:C.text,fontFamily:F,marginBottom:16}}>{rejectTarget.title} 결의를 반려하시겠습니까?</div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <Btn v="ghost" onClick={()=>setRejectTarget(null)}>취소</Btn>
              <Btn v="rose" onClick={()=>rejectItem(rejectTarget.id)}>반려</Btn>
            </div>
          </div>
        )}
      </Modal>
      <Modal open={addItemModal} onClose={()=>setAddItemModal(false)} title="지출 결의 요청" width={400}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {[{l:"항목명",k:"title",t:"text"},{l:"금액(원)",k:"amount",t:"number"},
            {l:"요청자",k:"reqBy",t:"text"},{l:"날짜",k:"date",t:"date"}].map(f=>(
            <div key={f.k}>
              <label style={{color:C.muted,fontSize:11,fontFamily:F,display:"block",marginBottom:4}}>{f.l}</label>
              <Inp type={f.t} value={iForm[f.k]} onChange={e=>setIForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.l}/>
            </div>
          ))}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}>
            <Btn v="ghost" onClick={()=>setAddItemModal(false)}>취소</Btn>
            <Btn v="primary" onClick={addItem} disabled={!iForm.title.trim()||!iForm.amount}>요청</Btn>
          </div>
        </div>
      </Modal>
      <Modal open={addBudgetModal} onClose={()=>setAddBudgetModal(false)} title="부서 예산 추가" width={360}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {[{l:"부서명",k:"dept",t:"text"},{l:"카테고리",k:"cat",t:"text"},{l:"예산(원)",k:"budget",t:"number"}].map(f=>(
            <div key={f.k}>
              <label style={{color:C.muted,fontSize:11,fontFamily:F,display:"block",marginBottom:4}}>{f.l}</label>
              <Inp type={f.t} value={bForm[f.k]} onChange={e=>setBForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.l}/>
            </div>
          ))}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}>
            <Btn v="ghost" onClick={()=>setAddBudgetModal(false)}>취소</Btn>
            <Btn v="primary" onClick={addBudget} disabled={!bForm.dept.trim()||!bForm.budget}>추가</Btn>
          </div>
        </div>
      </Modal>
    </div>
  );
}
// ══ 7. BULLETIN ════════════════════════════════════════
function BulletinTab() {
  const [preview, setPreview] = useState(false);
  const [bul, setBul] = usePersist("erp_bulletin", BULLETIN_INIT);
  const addNotice = () => setBul(p=>({...p,notices:[...p.notices,"새 공지 내용"]}));
  const delNotice = i => setBul(p=>({...p,notices:p.notices.filter((_,j)=>j!==i)}));
  const editNotice = (i,v) => setBul(p=>({...p,notices:p.notices.map((n,j)=>j===i?v:n)}));

  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <Badge c={C.gold}>디지털 주보 생성기</Badge>
        <span style={{color:C.muted,fontSize:12,fontFamily:F}}>종이 주보 대체 인터랙티브 주보</span>
        <div style={{marginLeft:"auto",display:"flex",gap:8}}>
          <Btn v="ghost" onClick={()=>setPreview(!preview)}>{preview?"✏️ 편집":"👁️ 미리보기"}</Btn>
          <Btn v="ghost" style={{color:"#FAE100",borderColor:"#FAE100"}}>📱 카카오 발송</Btn>
          <Btn v="primary">🔗 링크 복사</Btn>
        </div>
      </div>

      {!preview?(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
          <Card style={{padding:22}}>
            <SH title="주보 편집"/>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {[{l:"날짜",k:"date",t:"date"},{l:"제목",k:"title",t:"text"},{l:"설교자",k:"pastor",t:"text"},
                {l:"본문",k:"scripture",t:"text"},{l:"설교 제목",k:"sermonTitle",t:"text"},{l:"연락처",k:"contact",t:"text"}].map(f=>(
                <div key={f.k}>
                  <label style={{color:C.muted,fontSize:11,fontFamily:F,display:"block",marginBottom:4}}>{f.l}</label>
                  <Inp type={f.t} value={bul[f.k]} onChange={e=>setBul(p=>({...p,[f.k]:e.target.value}))}/>
                </div>
              ))}
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{color:C.muted,fontSize:12,fontFamily:F}}>온라인 헌금 버튼</span>
                <Toggle on={bul.offeringOn} onChange={v=>setBul(p=>({...p,offeringOn:v}))}/>
              </div>
            </div>
          </Card>
          <Card style={{padding:22}}>
            <SH title="공지 사항" action={<Btn sz="sm" v="ghost" onClick={addNotice}>+ 추가</Btn>}/>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {bul.notices.map((n,i)=>(
                <div key={i} style={{display:"flex",gap:6}}>
                  <input value={n} onChange={e=>editNotice(i,e.target.value)}
                    style={{flex:1,background:C.s2,border:`1px solid ${C.border}`,borderRadius:8,
                      padding:"7px 11px",color:C.text,fontFamily:F,fontSize:12,outline:"none"}}/>
                  <Btn sz="sm" v="rose" onClick={()=>delNotice(i)}>✕</Btn>
                </div>
              ))}
            </div>
          </Card>
        </div>
      ):(
        <div style={{display:"flex",justifyContent:"center"}}>
          <div style={{width:350,background:"linear-gradient(180deg,#FFFDF8,#EEF3FA)",
            border:`1px solid ${C.gold}44`,borderRadius:20,padding:22,
            boxShadow:`0 0 40px ${C.gold}18`}}>
            <div style={{textAlign:"center",paddingBottom:16,borderBottom:`1px solid ${C.border}`,marginBottom:16}}>
              <div style={{color:C.gold,fontFamily:FB,fontSize:10,letterSpacing:3,marginBottom:3}}>GRACE CENTRAL CHURCH</div>
              <div style={{color:C.text,fontFamily:FB,fontSize:18,fontWeight:700}}>{bul.title}</div>
              <div style={{color:C.muted,fontSize:11,marginTop:3,fontFamily:F}}>{bul.date}</div>
            </div>
            <div style={{background:`${C.violet}11`,borderRadius:11,padding:"12px 14px",marginBottom:14,borderLeft:`3px solid ${C.violet}`}}>
              <div style={{color:C.violet,fontSize:10,fontFamily:FB,fontStyle:"italic",marginBottom:3}}>오늘의 말씀</div>
              <div style={{color:C.sub,fontSize:12,fontFamily:F,lineHeight:1.6}}>{bul.scripture}</div>
            </div>
            <div style={{background:C.s2,borderRadius:11,padding:"12px 14px",marginBottom:12}}>
              <div style={{color:C.muted,fontSize:10,fontFamily:F,marginBottom:3}}>📖 {bul.scripture}</div>
              <div style={{color:C.text,fontSize:14,fontWeight:700,fontFamily:F}}>{bul.sermonTitle}</div>
              <div style={{color:C.muted,fontSize:11,marginTop:3,fontFamily:F}}>{bul.pastor}</div>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{color:C.gold,fontSize:11,fontWeight:700,marginBottom:8,fontFamily:F}}>📣 공지사항</div>
              {bul.notices.map((n,i)=>(
                <div key={i} style={{color:C.sub,fontSize:11,fontFamily:F,padding:"5px 0",
                  borderBottom:`1px solid ${C.border}`,lineHeight:1.5}}>{n}</div>
              ))}
            </div>
            {bul.offeringOn&&(
              <button style={{width:"100%",background:`linear-gradient(135deg,${C.gold},${C.amber})`,
                border:"none",borderRadius:11,padding:13,color:"#1a0f00",fontWeight:700,
                fontSize:14,cursor:"pointer",fontFamily:F}} onClick={()=>toast.success("온라인 헌금 페이지로 이동합니다 (포트원 PG 연동 예정)")}>💝 온라인 헌금하기</button>
            )}
            <div style={{textAlign:"center",color:C.muted,fontSize:10,marginTop:12,fontFamily:F}}>☎ {bul.contact}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Prayer Tab v6 (삭제 추가) ──────────────────────────
function PrayerTab() {
  const [prayers, setPrayers] = usePersist("erp_prayers", PRAYERS_INIT);
  const [addModal, setAddModal] = useState(false);
  const [editModal, setEditModal] = useState(null);
  const [delConfirm, setDelConfirm] = useState(null);
  const [filterCat, setFilterCat] = useState("전체");
  const [form, setForm] = useState({member:"",content:"",category:"진로",anonymous:false});
  const cats = ["전체","진로","건강","사업","자녀","가정","기타"];
  const catC = c=>({진로:C.sky,건강:C.emerald,사업:C.gold,자녀:C.violet,가정:C.rose,기타:C.muted}[c]||C.muted);

  const markAnswered = id=>{
    setPrayers(p=>p.map(x=>x.id===id?{...x,answered:true}:x));
    toast.success("응답 감사 처리되었습니다 🙏");
  };
  const joinIntercession = id=>{
    setPrayers(p=>p.map(x=>x.id===id&&!x.intercessors.includes("나")?{...x,intercessors:[...x.intercessors,"나"]}:x));
    toast.success("중보기도에 참여했습니다");
  };
  const deletePrayer = id=>{
    setPrayers(p=>p.filter(x=>x.id!==id));
    toast.info("기도 제목이 삭제되었습니다");
    setDelConfirm(null);
  };
  const addPrayer = ()=>{
    if(!V.required(form.content)) { toast.error("기도 제목을 입력해주세요"); return; }
    setPrayers(p=>[{id:Date.now(),member:form.anonymous?"(익명)":form.member||"익명",
      content:form.content,category:form.category,date:today(),answered:false,intercessors:[]},...p]);
    toast.success("기도 제목이 등록되었습니다");
    setAddModal(false); setForm({member:"",content:"",category:"진로",anonymous:false});
  };
  const saveEdit = ()=>{
    if(!V.required(editModal.content)) return;
    setPrayers(p=>p.map(x=>x.id===editModal.id?{...x,content:editModal.content,category:editModal.category}:x));
    toast.success("기도 제목이 수정되었습니다");
    setEditModal(null);
  };

  const filtered = prayers.filter(p=>filterCat==="전체"||p.category===filterCat);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
        {[{l:"전체",v:prayers.length,c:C.violet},{l:"응답 감사",v:prayers.filter(p=>p.answered).length,c:C.emerald},
          {l:"중보 참여자",v:[...new Set(prayers.flatMap(p=>p.intercessors))].length,c:C.gold},
          {l:"미응답",v:prayers.filter(p=>!p.answered).length,c:C.rose}].map(x=>(
          <Card key={x.l} style={{padding:"14px 18px"}}>
            <div style={{color:C.muted,fontSize:11,fontFamily:F,marginBottom:3}}>{x.l}</div>
            <div style={{color:x.c,fontSize:20,fontWeight:700,fontFamily:F}}>{x.v}건</div>
          </Card>
        ))}
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setFilterCat(c)} style={{padding:"6px 14px",borderRadius:20,border:"none",
            cursor:"pointer",fontFamily:F,fontSize:12,background:filterCat===c?catC(c):C.s2,
            color:filterCat===c?"#fff":C.sub,transition:"all .15s"}}>{c}</button>
        ))}
        <Btn v="primary" style={{marginLeft:"auto"}} onClick={()=>setAddModal(true)}>+ 기도 제목 등록</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:14}}>
        {filtered.map(p=>(
          <Card key={p.id} style={{padding:18}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <div style={{display:"flex",gap:6}}>
                <Badge c={catC(p.category)}>{p.category}</Badge>
                {p.answered&&<Badge c={C.emerald}>✓ 응답</Badge>}
              </div>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                <span style={{color:C.muted,fontSize:11,fontFamily:F}}>{p.date}</span>
                <button onClick={()=>setEditModal({...p})} style={{background:"none",border:"none",
                  color:C.muted,cursor:"pointer",fontSize:13,padding:"0 4px"}}>✏️</button>
                <button onClick={()=>setDelConfirm(p)} style={{background:"none",border:"none",
                  color:C.rose,cursor:"pointer",fontSize:13,padding:"0 4px"}}>🗑️</button>
              </div>
            </div>
            <div style={{color:C.text,fontSize:13,fontFamily:F,lineHeight:1.7,marginBottom:8}}>"{p.content}"</div>
            <div style={{color:C.muted,fontSize:11,fontFamily:F,marginBottom:10}}>— {p.member}</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>

function WorshipTab({ members }) {
  const activeM = members.filter(m=>m.status==="active"&&["장로","권사","집사","안수집사","서리집사"].includes(m.role));
  const names = activeM.length>0 ? activeM.map(m=>m.name) : WORSHIP_MEMBERS;

  const genRotation = useCallback(() => {
    const shuffled = [...names].sort(()=>Math.random()-0.5);
    return WORSHIP_ROLES.reduce((acc,role,i)=>({...acc,[role]:shuffled[i%shuffled.length]}),{});
  },[names]);

  const [schedules, setSchedules] = usePersist("erp_worship", WORSHIP_SCHEDULES_INIT);
  const [addModal, setAddModal] = useState(false);
  const [editModal, setEditModal] = useState(null);
  const [newWeek, setNewWeek] = useState(today());
  const [editAssign, setEditAssign] = useState({});

  const addSchedule = () => {
    if(!newWeek) return;
    const exists = schedules.find(s=>s.week===newWeek);
    if(exists) return;
    setSchedules(p=>[{week:newWeek,assignments:genRotation(),notified:false},...p].sort((a,b)=>b.week.localeCompare(a.week)));
    setAddModal(false);
  };

  const openEdit = (s) => { setEditModal(s); setEditAssign({...s.assignments}); };
  const saveEdit = () => {
    setSchedules(p=>p.map(s=>s.week===editModal.week?{...s,assignments:{...editAssign}}:s));
    setEditModal(null);
  };
  const notify = week => {
    setSchedules(p=>p.map(s=>s.week===week?{...s,notified:true}:s));
    toast.success(`${week} 배정 알림 발송 완료 (카카오 알림톡 연동 예정)`);
  };
  const shuffle = week => {
    setSchedules(p=>p.map(s=>s.week===week?{...s,assignments:genRotation()}:s));
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{color:C.text,fontFamily:FB,fontSize:14,fontWeight:700}}>예배 위원 자동 로테이션</div>
          <div style={{color:C.muted,fontSize:11,fontFamily:F,marginTop:2}}>직분자 자동 순환 배정 · 전날 카카오 알림톡 발송</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn v="ghost" onClick={()=>setAddModal(true)}>+ 주 추가</Btn>
        </div>
      </div>

      {/* 배정 알림 안내 */}
      <div style={{background:`${C.gold}0D`,border:`1px solid ${C.gold}33`,borderRadius:12,
        padding:"12px 16px",display:"flex",gap:12,alignItems:"center"}}>
        <span style={{fontSize:22}}>🔔</span>
        <div style={{flex:1}}>
          <div style={{color:C.gold,fontSize:12,fontFamily:F,fontWeight:600}}>자동 알림 시스템</div>
          <div style={{color:C.muted,fontSize:11,fontFamily:F,marginTop:1}}>
            예배 전날 오전 10시 자동 발송 — 카카오 알림톡 → SMS 폴백 → 앱 푸시
          </div>
        </div>
        <Badge c={C.gold}>API 연동 가능</Badge>
      </div>

      {/* 주차별 배정 */}
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {schedules.map(s=>(
          <Card key={s.week} style={{padding:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{color:C.text,fontFamily:FB,fontSize:13,fontWeight:700}}>{s.week} 주일 예배</span>
                {s.notified&&<Badge c={C.emerald}>✓ 알림 발송됨</Badge>}
              </div>
              <div style={{display:"flex",gap:6}}>
                <Btn sz="sm" v="ghost" onClick={()=>shuffle(s.week)}>🔀 재배정</Btn>
                <Btn sz="sm" v="ghost" onClick={()=>openEdit(s)}>✏️ 수동 수정</Btn>
                <Btn sz="sm" v={s.notified?"ghost":"amber"} onClick={()=>!s.notified&&notify(s.week)} disabled={s.notified}>
                  {s.notified?"발송 완료":"📱 알림 발송"}
                </Btn>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
              {WORSHIP_ROLES.map(role=>(
                <div key={role} style={{background:C.s2,borderRadius:9,padding:"10px 12px"}}>
                  <div style={{color:C.muted,fontSize:10,fontFamily:F,marginBottom:4}}>{role}</div>
                  <div style={{color:C.violet,fontSize:13,fontFamily:F,fontWeight:600}}>{s.assignments[role]}</div>
                </div>
              ))}
            </div>
          </Card>
        ))}
      </div>

      {/* 모달 */}
      <Modal open={addModal} onClose={()=>setAddModal(false)} title="주 추가" width={320}>
        <div style={{display:"flex",flexDirection:"column",gap:13}}>
          <div>
            <label style={{color:C.muted,fontSize:11,fontFamily:F,display:"block",marginBottom:5}}>날짜</label>
            <Inp type="date" value={newWeek} onChange={e=>setNewWeek(e.target.value)}/>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn v="ghost" onClick={()=>setAddModal(false)}>취소</Btn>
            <Btn v="primary" onClick={addSchedule}>추가 + 자동배정</Btn>
          </div>
        </div>
      </Modal>

      <Modal open={!!editModal} onClose={()=>setEditModal(null)} title="수동 수정" width={420}>
        {editModal&&(
          <div>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
              {WORSHIP_ROLES.map(role=>(
                <div key={role} style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{color:C.muted,fontSize:12,fontFamily:F,width:90,flexShrink:0}}>{role}</span>
                  <Sel value={editAssign[role]||""} onChange={v=>setEditAssign(p=>({...p,[role]:v}))} opts={names}/>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <Btn v="ghost" onClick={()=>setEditModal(null)}>취소</Btn>
              <Btn v="primary" onClick={saveEdit}>저장</Btn>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

            <div style={{color:C.violet,fontSize:14,fontFamily:F,fontWeight:600}}>발송 중...</div>
            <div style={{color:C.muted,fontSize:12,fontFamily:F,marginTop:6}}>{targetCount}명에게 전송 중</div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>

// ══ 14. NEW MEMBER PIPELINE ════════════════════════════
function NewMemberTab({ members, setMembers }) {
  const [pipeline, setPipeline] = usePersist("erp_newmember", NEWMEMBER_PIPELINE_INIT);
  const [addModal, setAddModal] = useState(false);
  const [form, setForm] = useState({name:"",phone:"",date:today(),assignedTo:"",memo:""});
  const [detailSel, setDetailSel] = useState(null);

  const STEPS = [
    {k:"w1",l:"1주 팔로업",desc:"등록 후 1주 이내 연락"},
    {k:"w3",l:"3주 확인",desc:"정착 여부 중간 점검"},
    {k:"w6",l:"6주 심방",desc:"가정 방문 또는 면담"},
    {k:"w12",l:"3개월 정착",desc:"소그룹 연결 완료"},
    {k:"settled",l:"정착 완료",desc:"교적 정식 등록"},
  ];

  const toggleStep = (id,step) => {
    setPipeline(p=>p.map(m=>m.id===id?{...m,steps:{...m.steps,[step]:!m.steps[step]}}:m));
  };

  const addNewMember = () => {
    if(!form.name.trim()) return;
    const newM={id:Date.now(),...form,steps:{w1:false,w3:false,w6:false,w12:false,settled:false}};
    setPipeline(p=>[newM,...p]);
    setAddModal(false);
    setForm({name:"",phone:"",date:today(),assignedTo:"",memo:""});
  };

  const settleToMain = (m) => {
    setMembers(prev=>[...prev,{
      id:Date.now(),name:m.name,role:"성도",dept:"미배정",zone:"미배정",
      phone:m.phone,joined:m.date,status:"active",
      roleHistory:[{date:m.date,role:"성도",event:"등록"}],visits:[],
    }]);
    setPipeline(p=>p.map(x=>x.id===m.id?{...x,steps:{...x.steps,settled:true}}:x));
    toast.success(`${m.name} 성도가 교적에 정식 등록되었습니다 ✅`);
  };

  const progressOf = m => Object.values(m.steps).filter(Boolean).length;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      {/* 요약 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
        {[
          {l:"이번 달 새신자",v:pipeline.filter(m=>m.date>=WEEKS[0].slice(0,7)).length,c:C.violet},
          {l:"팔로업 진행중",v:pipeline.filter(m=>!m.steps.settled).length,c:C.amber},
          {l:"정착 완료",v:pipeline.filter(m=>m.steps.settled).length,c:C.emerald},
          {l:"정착률",v:`${pipeline.length?Math.round(pipeline.filter(m=>m.steps.settled).length/pipeline.length*100):0}%`,c:C.gold},
        ].map(x=>(
          <Card key={x.l} style={{padding:"14px 18px"}}>
            <div style={{color:C.muted,fontSize:11,fontFamily:F,marginBottom:3}}>{x.l}</div>
            <div style={{color:x.c,fontSize:20,fontWeight:700,fontFamily:F}}>{x.v}</div>
          </Card>
        ))}
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{color:C.text,fontFamily:F,fontSize:13,fontWeight:600}}>새신자 정착 파이프라인</div>
        <Btn v="primary" onClick={()=>setAddModal(true)}>+ 새신자 등록</Btn>
      </div>

      {/* 파이프라인 카드들 */}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {pipeline.map(m=>{
          const prog=progressOf(m);
          const pct=Math.round(prog/5*100);
